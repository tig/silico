[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bedside"
version = "0.1.2"
description = "Bedside CLI: pin, doctor, and eval operator manners for AI agents"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [{ name = "Charlie Kindel" }]
keywords = ["agents", "operators", "eval", "cli"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
bedside = "bedside.cli:main"

[project.urls]
Homepage = "https://github.com/tig/bedside"
Repository = "https://github.com/tig/bedside"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
bedside = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
