name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  host-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + dev
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Host gate
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          silico version
          silico doctor
