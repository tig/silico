# Part truth: pointers, not documents (silico AGENTS, "Part truth").
#
# Every part this GCU is built from, and where the truth about it lives.
# Silico never commits or redistributes the documents themselves; run
# `silico parts --fetch` to pull local grounding copies into .silico/parts/
# (git-ignored). Prefer machine-readable truth (svd, dt_binding, driver)
# over the PDF when a part has it.

[[part]]
id = "rp2040"
name = "Raspberry Pi RP2040"
role = "mcu"
datasheet = "https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf"
svd = "https://raw.githubusercontent.com/raspberrypi/pico-sdk/master/src/rp2040/hardware_regs/RP2040.svd"
driver = "https://github.com/micropython/micropython/tree/master/ports/rp2"
notes = "SVD ships in pico-sdk (BSD-3); register-level truth, prefer it over the PDF."

[[part]]
id = "xiao-rp2040"
name = "Seeed XIAO RP2040"
role = "board"
docs = "https://wiki.seeedstudio.com/XIAO-RP2040/"
notes = "Board pinout and D-label to GPIO mapping."
